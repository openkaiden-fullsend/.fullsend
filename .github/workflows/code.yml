name: Code

on:
  workflow_dispatch:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string

concurrency:
  group: fullsend-code-${{ fromJSON(inputs.event_payload).issue.number }}
  cancel-in-progress: true

jobs:
  code:
    name: Code
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: write
      packages: read
      pull-requests: write

    steps:
      - name: Checkout .fullsend repository
        uses: actions/checkout@v6

      - name: Validate source repo is enrolled
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}
        run: |
          # Format check — must be owner/repo, safe characters only
          if [[ ! "$SOURCE_REPO" =~ ^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid source_repo format: must be owner/repo"
            exit 1
          fi
          # Owner check — must match this org
          REPO_OWNER="${SOURCE_REPO%%/*}"
          if [[ "$REPO_OWNER" != "$GITHUB_REPOSITORY_OWNER" ]]; then
            echo "::error::source_repo owner does not match org"
            exit 1
          fi
          # Allowlist check — repo must be enabled in config.yaml
          REPO_NAME="${SOURCE_REPO#*/}"
          ENABLED=$(yq ".repos.\"$REPO_NAME\".enabled" config.yaml 2>/dev/null)
          if [[ "$ENABLED" != "true" ]]; then
            echo "::error::repo is not enabled in config.yaml"
            exit 1
          fi

      - name: Extract target repo name
        id: repo-parts
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}
        run: echo "name=${SOURCE_REPO##*/}" >> "${GITHUB_OUTPUT}"

      - name: Generate sandbox token (read-only)
        id: sandbox-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FULLSEND_CODER_CLIENT_ID }}
          private-key: ${{ secrets.FULLSEND_CODER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.repo-parts.outputs.name }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read
          permission-metadata: read

      - name: Generate push token (write)
        id: push-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FULLSEND_CODER_CLIENT_ID }}
          private-key: ${{ secrets.FULLSEND_CODER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.repo-parts.outputs.name }}

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.source_repo }}
          token: ${{ steps.sandbox-token.outputs.token }}
          path: target-repo
          fetch-depth: 0
          persist-credentials: false

      - name: Validate inputs
        env:
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
        run: bash scripts/pre-code.sh

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FULLSEND_GCP_SA_KEY_JSON }}

      - name: Mask GCP credential file paths
        run: |
          for var in GOOGLE_GHA_CREDS_PATH GOOGLE_APPLICATION_CREDENTIALS CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE; do
            val="${!var:-}"
            if [[ -n "${val}" ]]; then
              echo "::add-mask::${val}"
            fi
          done

      - name: Setup agent environment
        env:
          AGENT_PREFIX: CODE_
          CODE_GH_TOKEN: ${{ steps.sandbox-token.outputs.token }}
          CODE_TARGET_REPO_DIR: target-repo
          CODE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          CODE_CLOUD_ML_REGION: ${{ vars.FULLSEND_GCP_REGION }}
          CODE_ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run code agent
        uses: ./.github/actions/fullsend
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          PUSH_TOKEN: ${{ steps.push-token.outputs.token }}
          PUSH_TOKEN_SOURCE: github-app
          TARGET_BRANCH: main
        with:
          agent: code
